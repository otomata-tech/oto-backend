name: CI

# Gate de test : sans ça, le deploy (push main) shippe un main rouge sans rien
# bloquer. Tourne sur les PR (bloque le merge via branch protection) ET sur push
# main (visibilité de l'état). Le deploy ne lance toujours pas les tests — c'est
# ce job qui tient la barrière.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        # Tire oto-core depuis le tag git pinné du pyproject (repo public, pas d'auth).
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
