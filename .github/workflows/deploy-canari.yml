name: Deploy preprod

# Modèle de release (ADR 0020, refonte 2026-07-20) : push sur `main` → PREPROD.
# `main` est la branche de tronc ; tout merge/push y déploie l'environnement staging
# (checkout /opt/oto-mcp-canari, service oto-mcp-canari, endpoint mcp-canari.oto.ninja,
# base chiffrée oto_canari — l'ancien « canari » de l'ADR 0040, désormais alimenté par
# main). La PROD ne se déploie QUE sur un tag `v*` (deploy.yml). La logique serveur
# (reset origin/main + reinstall oto-core au tag + restart + healthcheck + rollback)
# vit dans /opt/deploy/oto-backend-canari.sh — source de vérité unique.
# Le job `test` tourne aussi sur PR vers main (= le check de validation avant merge).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  deploy-preprod:
    needs: test
    # push main OU relance manuelle (workflow_dispatch depuis main) — un dispatch
    # qui ne faisait que les tests laissait croire à un déploiement (vécu 23/07 :
    # canari resté en arrière après un push failed, dispatch « success » sans effet).
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, oto-platform]
    concurrency:
      group: deploy-preprod
      cancel-in-progress: false
    steps:
      - name: Deploy preprod (build serveur via script root-restreint)
        run: sudo /opt/deploy/oto-backend-canari.sh
