name: Deploy prod

# Modèle de release (ADR 0020, refonte 2026-07-20) : un TAG `v*` → PROD.
# main = tronc/preprod (deploy-canari.yml) ; la prod est un acte explicite = poser un
# tag `vX.Y.Z` sur le commit de main à promouvoir (`git tag vX.Y.Z && git push origin
# vX.Y.Z`). Le tag est passé au script serveur root-restreint /opt/deploy/oto-backend.sh
# (reset --hard <tag> + reinstall oto-core au tag pyproject + restart + healthcheck +
# rollback). test → deploy (`needs: test`, ceinture+bretelles au tag). Cf. ADR 0020.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag à déployer en prod (ex: v1.2.3)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEPLOY_REF: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      # Valide le format du tag AVANT tout usage (anti-injection : le ref/input
      # atterrit ensuite dans un `ref:` de checkout et une commande shell).
      - name: Validate tag format
        run: |
          case "$DEPLOY_REF" in
            v[0-9]*) echo "tag ok: $DEPLOY_REF" ;;
            *) echo "tag invalide (attendu vX.Y.Z): $DEPLOY_REF" >&2; exit 1 ;;
          esac
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        # Tire oto-core depuis le tag git pinné du pyproject (repo public, pas d'auth).
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: [self-hosted, oto-platform]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      DEPLOY_REF: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Deploy prod (build serveur via script root-restreint)
        # Runner self-hosted sur la box dédiée (sudo NOPASSWD limité à
        # /opt/deploy/oto-backend.sh). Le tag validé est passé en argument via env.
        run: |
          case "$DEPLOY_REF" in
            v[0-9]*) : ;;
            *) echo "tag invalide: $DEPLOY_REF" >&2; exit 1 ;;
          esac
          sudo /opt/deploy/oto-backend.sh "$DEPLOY_REF"
