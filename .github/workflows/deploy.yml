name: CI/CD

# test → deploy : le deploy DÉPEND d'un CI vert (`needs: test`). Avant, Deploy et CI
# tournaient en parallèle sur push main → un commit rouge déployait quand même.
# Désormais un test rouge bloque le deploy. Le job `test` tourne aussi sur PR (= le
# required check de branch protection). Cf. otomata-private#39 (revue CI/CD).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        # Tire oto-core depuis le tag git pinné du pyproject (repo public, pas d'auth).
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, oto-platform]
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Deploy (build serveur via script root-restreint)
        # Runner self-hosted sur la box dédiée (user non-root `gha-runner`, sudo
        # NOPASSWD limité à /opt/deploy/oto-backend.sh) : plus de SSH entrant (le
        # port 22 de la box est filtré par CrowdSec, qui droppe les IP des runners
        # GitHub hosted). La logique de deploy (reset + reinstall oto-core au tag +
        # restart + healthcheck + rollback) vit dans le script serveur — source de
        # vérité unique. Cf. ADR 0020 + otomata-private#39.
        run: sudo /opt/deploy/oto-backend.sh
