name: CI/CD

# test → deploy : le deploy DÉPEND d'un CI vert (`needs: test`). Avant, Deploy et CI
# tournaient en parallèle sur push main → un commit rouge déployait quand même.
# Désormais un test rouge bloque le deploy. Le job `test` tourne aussi sur PR (= le
# required check de branch protection). Cf. otomata-private#39 (revue CI/CD).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        # Tire oto-core depuis le tag git pinné du pyproject (repo public, pas d'auth).
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Deploy to box
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/oto-mcp || exit 1
            HEALTH="https://mcp.oto.ninja/.well-known/oauth-authorization-server"
            PREV=$(git rev-parse HEAD)            # commit courant, pour rollback

            # reset → reinstall → restart, chaînés : non-zéro si une étape échoue.
            # ⚠️ pip NE réinstalle PAS une dép VCS déjà présente (oto-core "satisfait"
            # quelle que soit sa version) → `pip install -e .` seul ne monte jamais
            # oto-core au tag bumpé. On force-réinstalle oto-core depuis le tag LU du
            # pyproject (source unique, pas de hardcode). Cf. ADR 0020 + otomata-private#39.
            deploy() {
              git reset --hard "$1" || return 1
              tag=$(grep -oP 'oto-core\.git@\K[^"]+' pyproject.toml) || return 1
              ./.venv/bin/pip install -e . --quiet \
                && ./.venv/bin/pip install --force-reinstall --quiet "oto-core[browser] @ git+https://github.com/otomata-tech/oto-core.git@${tag}" \
                && systemctl restart oto-mcp
            }
            # service actif ET endpoint public répond 200 (retry ~25s pour le boot).
            healthy() {
              for i in 1 2 3 4 5 6 7 8; do
                systemctl is-active --quiet oto-mcp && curl -fsS --max-time 10 "$HEALTH" -o /dev/null 2>/dev/null && return 0
                sleep 3
              done
              return 1
            }

            git fetch origin main || exit 1
            if deploy origin/main && healthy; then
              echo "deploy OK"; journalctl -u oto-mcp -n 10 --no-pager
            else
              echo "DÉPLOIEMENT KO (install/restart/healthcheck) → rollback vers $PREV"
              journalctl -u oto-mcp -n 50 --no-pager
              deploy "$PREV" && healthy && echo "rollback OK (restauré $PREV)" || echo "⚠️ ROLLBACK EN ÉCHEC — intervention manuelle requise"
              exit 1
            fi
