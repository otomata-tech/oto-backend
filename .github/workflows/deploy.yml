name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to oto-platform box
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: REDACTED_IP
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/oto-mcp
            git fetch origin main
            git reset --hard origin/main
            ./.venv/bin/pip install -e . --quiet
            # Sync oto-core (lib connecteurs, repo séparé) — le deploy ne resette QUE
            # /opt/oto-mcp, donc la box gardait un clone oto-core périmé : tout
            # changement de client (serper/serpapi/cloro/brightdata…) ne parvenait
            # jamais en prod → erreurs de signature désynchronisée (ex. search_jobs).
            # Réinstalle oto-core@main à chaque deploy (repo public, pas d'auth).
            ./.venv/bin/pip install --upgrade --force-reinstall --no-deps \
              "oto-core @ git+https://github.com/otomata-tech/oto-core.git@main" --quiet
            systemctl restart oto-mcp
            sleep 3
            systemctl is-active --quiet oto-mcp || (journalctl -u oto-mcp -n 50 --no-pager; exit 1)
            journalctl -u oto-mcp -n 10 --no-pager
