name: CI/CD

# test → deploy : le deploy DÉPEND d'un CI vert (`needs: test`). Avant, Deploy et CI
# tournaient en parallèle sur push main → un commit rouge déployait quand même.
# Désormais un test rouge bloque le deploy. Le job `test` tourne aussi sur PR (= le
# required check de branch protection). Cf. otomata-private#39 (revue CI/CD).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (deps + dev)
        # Tire oto-core depuis le tag git pinné du pyproject (repo public, pas d'auth).
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  deploy:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Deploy to box
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/oto-mcp
            git fetch origin main
            git reset --hard origin/main
            # oto-core est PINNÉ sur un tag git dans pyproject.toml (ref URL directe) :
            # `pip install -e .` l'installe depuis ce tag (réinstall auto au bump du
            # tag via direct_url, idempotent sinon). Fini le force-reinstall @main
            # flottant — une version déployée = une coordonnée reproductible. Bump =
            # PR qui édite le tag dans pyproject. Cf. ADR 0020 (deploy/canari).
            ./.venv/bin/pip install -e . --quiet
            systemctl restart oto-mcp
            sleep 3
            systemctl is-active --quiet oto-mcp || (journalctl -u oto-mcp -n 50 --no-pager; exit 1)
            journalctl -u oto-mcp -n 10 --no-pager
