<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
  <title>Oto Companion</title>
</head>
<body>
  <header>
    <div class="brand">Oto Companion</div>
    <button id="settings-toggle" class="icon-btn" title="Paramètres">⚙</button>
  </header>

  <section id="signed-out" hidden>
    <p class="muted">Connecte-toi avec ton compte oto pour pousser ta session LinkedIn vers le serveur MCP.</p>
    <button id="login" class="primary">Se connecter</button>
  </section>

  <section id="signed-in" hidden>
    <div class="user">
      <div id="user-name" class="name">—</div>
      <div id="user-email" class="muted small"></div>
    </div>

    <div id="li-status" class="status status-gray">
      <span id="li-status-label">Statut LinkedIn</span>
    </div>

    <div class="actions">
      <button id="sync" class="primary">Synchroniser ma session LinkedIn</button>
      <button id="open-li" class="secondary" hidden>Ouvrir linkedin.com</button>
    </div>

    <div class="footer">
      <button id="clear" class="link">Effacer la session côté serveur</button>
      <button id="logout" class="link">Se déconnecter</button>
    </div>
  </section>

  <section id="settings" hidden>
    <h2>Paramètres</h2>
    <label>
      <span>Logto endpoint</span>
      <input id="cfg-logto-endpoint" type="url" placeholder="https://auth.oto.zone" />
    </label>
    <label>
      <span>Logto app ID</span>
      <input id="cfg-logto-app-id" type="text" placeholder="abc123…" />
    </label>
    <label>
      <span>MCP base URL</span>
      <input id="cfg-mcp-base" type="url" placeholder="https://mcp.oto.ninja" />
    </label>
    <label>
      <span>MCP resource (audience)</span>
      <input id="cfg-logto-resource" type="url" placeholder="https://mcp.oto.ninja/mcp" />
    </label>
    <p class="muted small">
      Redirect URI à déclarer dans Logto :<br/>
      <code id="redirect-uri"></code>
    </p>
    <div class="actions">
      <button id="settings-save" class="primary">Enregistrer</button>
      <button id="settings-close" class="secondary">Retour</button>
    </div>
  </section>

  <div id="flash" hidden></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
