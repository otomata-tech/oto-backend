[project]
name = "oto-mcp"
version = "0.1.0"
description = "MCP server exposing selected oto-cli connectors as tools (Streamable HTTP, OAuth 2.1)."
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=2.0",
    "oto-cli[browser]>=1.1.0",
    "starlette>=0.37",
    "uvicorn>=0.30",
    "pydantic>=2.0",
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    # Rendu markdown→HTML des gmail_* (défaut markdown=True). Vit dans l'extra
    # `google` d'oto-cli, mais le serveur installe `oto-cli[browser]` → on le
    # déclare ici pour qu'il soit installé par le `pip install -e .` du deploy
    # (oto-mcp#17 : crash 'No module named markdown' en prod).
    "markdown>=3.5",
    "psycopg[binary]>=3.2",
    "psycopg-pool>=3.2",
    "france-opendata[stock]>=0.2.0",  # reader stock SIRENE (DuckDB parquet) — source unique partagée
    "cryptography>=42",
]

[project.optional-dependencies]
# Connecteur Movinmotion privé (hors core public oto-cli, cf. oto-cli#9). Extra
# OPTIONNEL, jamais dans le core : sinon `pip install -e .` au déploiement
# forcerait un clone SSH du repo privé à chaque deploy (clé SSH serveur). En
# prod, comme oto-cli, le venv est overridé par un clone editable
# (`pip install -e /opt/oto-mm`) ; `tools/mm.py` se désactive gracieusement si
# `oto_mm` est absent (try/except dans tools/__init__.py).
mm = [
    "oto-mm @ git+ssh://git@github.com/otomata-tech/oto-mm.git",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
oto-mcp = "oto_mcp.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["oto_mcp*"]
